# Windows Docker Desktop dev overrides (GPU host on Win32).
# - SQLite WAL fails on ./data bind mounts → pair with docker-compose.prod.yml
# - Port 8080 is often reserved by HTTP.sys; publish dashboard on 8081
# - dcgm-exporter needs Linux /sys/bus/pci; stub it on Windows dev
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.windows-dev.yml up -d

services:
  dashboard:
    ports: !override
      - "127.0.0.1:8081:8080"

  dcgm-exporter:
    image: busybox:stable
    command: ["sh", "-c", "sleep infinity"]
    cap_add: []
    environment: {}
    deploy: {}

  prometheus:
    depends_on:
      - ingestor
      - worker
      - alerter
      - dashboard
      - dcgm-exporter
