# Grafana dashboard provider.
# Mounted at /etc/grafana/provisioning/dashboards/ in the grafana container.
# Tells Grafana to load every .json file in /var/lib/grafana/dashboards/ on
# boot. The pipeline.json dashboard is bind-mounted into that directory.

apiVersion: 1

providers:
  - name: 'Radio Pipeline Dashboards'
    orgId: 1
    folder: 'Radio Pipeline'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
