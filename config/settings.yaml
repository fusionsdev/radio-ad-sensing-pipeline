chunk_len: 90
overlap: 7
retention_hours: 48
dedup_window_days: 7
confidence_threshold: 0.7
fuzzy_match_threshold: 85
queue_max_hours: 2
station_down_alert_minutes: 15
same_station_airing_window_seconds: 180
asr_model: medium.en
asr_compute_type: float16
dashboard_host: 127.0.0.1
dashboard_port: 8080
db_path: data/pipeline.db
chunks_dir: data/chunks
# Ingestor resilience — fast retry before exponential backoff
ingest_immediate_retries: 7
ingest_immediate_retry_delay_sec: 2
ingest_backoff_initial_sec: 2
ingest_backoff_max_sec: 60
ingest_bad_stream_empty_threshold: 20
ingest_bad_stream_window_minutes: 30
ingest_bad_stream_attempt_threshold: 20
ingest_bad_stream_pause_minutes: 45
ffmpeg_error_sample_lines: 20
# Delay each enabled station thread start by index × N seconds (reduces cold-start contention)
ingest_startup_stagger_sec: 15
# Requeue chunks left in processing by crashed/retired worker containers.
processing_stale_after_minutes: 60
# Minimum phrase confidence from loan_keywords.yaml to insert keyword_hits
keyword_min_record_confidence: 0.6

watchdog:
  enabled: true
  target_active_stations: 10
  station_stale_after_minutes: 6
  restart_attempts_before_disable: 3
  restart_backoff_seconds: 30
  health_check_interval_seconds: 60
  promote_backup_when_active_below_target: true
  backup_selection_strategy: priority_then_vertical_then_market
  cool_down_minutes_after_failure: 60
  max_station_failures_per_day: 5
  queue_drop_ratio_warning: 2.0
  queue_drop_ratio_critical: 5.0
  auto_restart_on_stale: true
  max_promotions_per_hour: 3
  max_active_per_market: 2
