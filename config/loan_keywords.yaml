# Loan/funding keyword dictionary v3 — phrase + per-phrase confidence.
# Re-curated 2026-06-11 against live corpus (1,346 transcripts, 232 detections, 2 active stations: WBAP, KLIF).
# Removed 26 dead phrases (0 hits) and 3 unverifiable categories (reverse_mortgage, timeshare_*, equity)
# that never aired on these Texas talk stations. Added 3 corpus-validated phrases.
# Worker records hits only when confidence >= keyword_min_record_confidence in settings.yaml.

keywords:
  # Tier 1: high-precision tax-relief phrases (validated against 22 tax_relief detections)
  - phrase: unfiled tax returns
    confidence: 0.95
  - phrase: back taxes
    confidence: 0.80
  - phrase: stop collections
    confidence: 0.80
  - phrase: tax relief
    confidence: 0.85
  - phrase: owe $10,000
    confidence: 0.85
  - phrase: fresh start
    confidence: 0.70

  # Tier 2: debt-relief phrases (validated against 25 debt_relief detections)
  - phrase: debt relief
    confidence: 0.70
  - phrase: tax attorneys
    confidence: 0.80
  - phrase: enrolled agents
    confidence: 0.75

  # Tier 3: insurance / life (validated against 27 insurance + 2 life_insurance detections)
  - phrase: term life insurance
    confidence: 0.70
  - phrase: life insurance
    confidence: 0.55
  - phrase: maintenance fees
    confidence: 0.60
