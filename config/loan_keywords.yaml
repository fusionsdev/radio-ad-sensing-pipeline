# Consumer personal-loan keyword dictionary.
# Keep this file restricted to real consumer personal loan intent.
# Do not add tax relief, insurance, debt settlement, auto dealer financing,
# home-improvement/window financing, supplements, or generic bank ads.
# Worker records hits only when confidence >= keyword_min_record_confidence
# in settings.yaml.

keywords:
  # Core personal loan offers
  - phrase: personal loan
    confidence: 0.90
  - phrase: personal loans
    confidence: 0.90
  - phrase: unsecured personal loan
    confidence: 0.85
  - phrase: debt consolidation loan
    confidence: 0.90

  # Installment / emergency cash loan offers
  - phrase: installment loan
    confidence: 0.75
  - phrase: emergency loan
    confidence: 0.80
  - phrase: fast cash loan
    confidence: 0.70
  - phrase: same day loan
    confidence: 0.75
  - phrase: bad credit loan
    confidence: 0.70
  - phrase: no credit check loan
    confidence: 0.65

  # Personal-loan use cases
  - phrase: wedding loan
    confidence: 0.75
  - phrase: vacation loan
    confidence: 0.70
  - phrase: major purchase loan
    confidence: 0.70
